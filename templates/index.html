<!DOCTYPE html>
<html>
<head>
    <title>Face Attendance</title>

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script defer src="/static/script.js"></script>
</head>

<body>

<h2>Register Student</h2>

<input type="text" id="name" placeholder="Name">
<input type="text" id="roll" placeholder="Roll">
<input type="text" id="dept" placeholder="Department">

<br><br>

<video id="video" width="400" height="300" autoplay muted></video>

<br><br>

<button onclick="startCapture()">Capture Face</button>
<button onclick="registerStudent()">Register</button>

<p id="status"></p>

<hr>

<h2>Mark Attendance (Liveness Required)</h2>

<button onclick="startLivenessCheck()">Start Liveness Check</button>

<p id="livenessStatus"></p>

</body>
</html>
